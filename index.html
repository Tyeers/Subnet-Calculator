<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Subnet Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        
        .input-section { display: flex; gap: 15px; margin-bottom: 25px; align-items: flex-end; background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        label { font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: #007bff; outline: none; }
        button { padding: 12px 25px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #218838; }

        .meta-info { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 30px; 
            padding: 20px; 
            background: #eef2f7; 
            border-radius: 10px; 
            border-left: 6px solid #007bff;
        }
        .meta-item { margin-bottom: 10px; }
        .formula { font-family: 'Courier New', monospace; background: #d1dce7; padding: 2px 5px; border-radius: 4px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; }
        th { background: #007bff; color: white; font-size: 14px; }
        .current-block { background: #fff3cd !important; font-weight: bold; }
        .binary-text { font-family: monospace; font-size: 13px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Subnetting</h2>
    
    <div class="input-section">
        <div class="input-group">
            <label>IP Address Dasar</label>
            <input type="text" id="ip">
        </div>
        <div class="input-group">
            <label>Prefix (CIDR)</label>
            <input type="number" id="cidr">
        </div>
        <button onclick="calculate()">Generate Analisis</button>
    </div>

    <div id="meta" class="meta-info" style="display:none">
        <div class="meta-left">
            <div class="meta-item"><b>Biner Subnet Mask:</b><br><span id="binMask" class="binary-text"></span></div>
            <div class="meta-item"><b>Subnet Mask (Desimal):</b> <span id="decMask"></span></div>
        </div>
        <div class="meta-right">
            <div class="meta-item"><b>Jumlah Blok:</b> <span id="blockFormula" class="formula"></span> = <span id="totalBlocks"></span></div>
            <div class="meta-item"><b>Total IP per Blok:</b> <span id="hostFormula" class="formula"></span> = <span id="usableHosts"></span></div>
        </div>
    </div>

    <table id="resultTable" style="display:none">
        <thead>
            <tr>
                <th>Blok</th>
                <th>IP Network</th>
                <th>IP Awal Host</th>
                <th>IP Akhir Host</th>
                <th>IP Broadcast</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
function calculate() {
    const rawIp = document.getElementById('ip').value.trim();
    const cidr = parseInt(document.getElementById('cidr').value);
    
    if (!rawIp || isNaN(cidr) || cidr < 0 || cidr > 32) return alert("Input tidak valid!");

    const parts = rawIp.split('.').map(Number);
    let ipNum = ((parts[0] << 24) >>> 0) | (parts[1] << 16) | (parts[2] << 8) | parts[3];
    
    const mask = (cidr === 0) ? 0 : ((-1 << (32 - cidr)) >>> 0);
    const totalAddrs = Math.pow(2, 32 - cidr);
    
    // Tentukan Kelas dan Network Dasar
    let startNetNum, defaultPrefix;
    if (parts[0] < 128) { startNetNum = (parts[0] << 24) >>> 0; defaultPrefix = 8; }
    else if (parts[0] < 192) { startNetNum = ((parts[0] << 24) | (parts[1] << 16)) >>> 0; defaultPrefix = 16; }
    else { startNetNum = ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8)) >>> 0; defaultPrefix = 24; }

    // Hitung Bit Subnet (n) dan Bit Host (h)
    const n = cidr - defaultPrefix;
    const h = 32 - cidr;
    const numBlocks = (n < 0) ? 1 : Math.pow(2, n);

    const toIP = (n) => [ (n >>> 24) & 0xff, (n >>> 16) & 0xff, (n >>> 8) & 0xff, n & 0xff ].join('.');
    const toBin = (n) => {
        let b = (n >>> 0).toString(2).padStart(32, '0');
        return b.match(/.{8}/g).join('.');
    };

    // Update Meta Info
    document.getElementById('binMask').innerText = toBin(mask);
    document.getElementById('decMask').innerText = toIP(mask);
    document.getElementById('blockFormula').innerText = `2^${n < 0 ? 0 : n}`;
    document.getElementById('totalBlocks').innerText = numBlocks;
    document.getElementById('hostFormula').innerText = `2^${h} - 2`;
    document.getElementById('usableHosts').innerText = (totalAddrs - 2).toLocaleString();
    document.getElementById('meta').style.display = 'grid';

    // Generate Tabel
    let html = '';
    let currentNet = startNetNum;
    const targetNet = (ipNum & mask) >>> 0;

    for (let i = 1; i <= numBlocks; i++) {
        let net = currentNet >>> 0;
        let first = (net + 1) >>> 0;
        let last = (net + totalAddrs - 2) >>> 0;
        let broad = (net + totalAddrs - 1) >>> 0;
        let isTarget = (net === targetNet) ? 'class="current-block"' : '';

        html += `<tr ${isTarget}>
            <td>${i}</td>
            <td>${toIP(net)}</td>
            <td>${toIP(first)}</td>
            <td>${toIP(last)}</td>
            <td>${toIP(broad)}</td>
        </tr>`;
        currentNet = (currentNet + totalAddrs) >>> 0;
        if (i >= 512) break; // Safety limit
    }

    document.getElementById('tableBody').innerHTML = html;
    document.getElementById('resultTable').style.display = 'table';
}
</script>
</body>
</html>
